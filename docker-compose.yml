version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: clawbid
      POSTGRES_USER: clawbid
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawbid"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  # ─── Backend API ─────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://clawbid:${DB_PASSWORD:-changeme}@postgres:5432/clawbid
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      BANKR_API_KEY: ${BANKR_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL:-https://clawbid.io}
      BACKEND_URL: ${BACKEND_URL:-https://api.clawbid.io}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "node src/db/migrate.js && node src/index.js"

  # ─── Frontend ────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-https://api.clawbid.io}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-wss://api.clawbid.io/ws}
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Nginx reverse proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
